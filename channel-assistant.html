<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f6f8;color:#1a1a1a;min-height:100vh}
.header{background:linear-gradient(135deg,#1677ff,#0958d9);color:#fff;padding:32px 40px}
.header h1{font-size:24px;font-weight:600;margin-bottom:6px}
.header p{font-size:14px;opacity:.85}
.container{max-width:1500px;margin:0 auto;padding:24px 40px}
.toolbar{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.search-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.search-box{flex:1;min-width:280px;position:relative}
.search-box input{width:100%;padding:10px 16px 10px 40px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;transition:border .2s}
.search-box input:focus{border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.1)}
.search-box .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#999;font-size:16px}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.filter-group{display:flex;gap:8px;align-items:center}
.filter-group label{font-size:13px;color:#666;white-space:nowrap}
.filter-group select{padding:8px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;outline:none;cursor:pointer;background:#fff}
.filter-group select:focus{border-color:#1677ff}
.stats-bar{display:flex;gap:16px;margin-top:12px;font-size:13px;color:#888}
.stats-bar strong{color:#1677ff}
.table-wrap{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#fafafa;padding:10px 12px;text-align:left;font-weight:600;color:#555;border-bottom:1px solid #f0f0f0;white-space:nowrap;position:sticky;top:0;z-index:1}
tbody td{padding:8px 12px;border-bottom:1px solid #f5f5f5;color:#333;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tbody tr:hover{background:#f0f6ff}
tbody tr:last-child td{border-bottom:none}
.tag{padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500;display:inline-block}
.tag-聚合{background:#e6f4ff;color:#1677ff}
.tag-撮合{background:#fff2e8;color:#fa8c16}
.tag-撮合、聚合,.tag-撮合+聚合{background:#f0f5ff;color:#722ed1}
.tag-上线{color:#52c41a;font-weight:600}
.tag-B{background:#f6ffed;color:#389e0d}
.tag-C{background:#fff7e6;color:#d48806}
.tag-预付{background:#e6f4ff;color:#1677ff}
.tag-月结{background:#fff0f6;color:#eb2f96}
.tag-标{background:#f6ffed;color:#389e0d}
.tag-非标{background:#fff7e6;color:#d48806}
.empty{text-align:center;padding:48px;color:#999;font-size:14px}
.empty .icon{font-size:40px;margin-bottom:12px}
.footer{padding:16px 40px;text-align:center;font-size:12px;color:#bbb}
@media(max-width:768px){.header{padding:20px}.container{padding:16px}.search-row{flex-direction:column}}
</style>

function excelDate(v) {
  if (v === null || v === undefined || v === '/' || v === '') return '';
  var n = Number(v);
  if (isNaN(n) || n < 40000) return v === '/' ? '' : String(v);
  var d = new Date((n - 25569) * 86400000);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmt(v) {
  if (v === null || v === undefined || v === '' || v === '/') return '';
  return String(v);
}
function numFmt(v) {
  if (v === null || v === undefined || v === '' || v === '/' || v === '——') return '';
  var n = Number(v);
  if (isNaN(n)) return String(v);
  if (n >= 10000 && n % 10000 === 0) return (n/10000) + '万';

var data = raw.map(function(r) {
  return {
    mode: fmt(r[0]),
    standard: fmt(r[1]),
    name: fmt(r[2]),
    type: fmt(r[3]),
    vehicle: fmt(r[4]),
    settlement: fmt(r[5]),
    biz: fmt(r[6]),
    proposeDate: excelDate(r[7]),
    onlineDate: excelDate(r[8]),
    status: fmt(r[9]),
    scale: numFmt(r[10]),
    dispatch: numFmt(r[11]),
    complete: numFmt(r[12]),
    note: fmt(r[13]),
    subchanel: fmt(r[14])
  };
});

function unique(field) {
  var s = new Set();
  data.forEach(function(d) { if (d[field]) s.add(d[field]); });
  return Array.from(s).sort();
}
function fillSelect(id, field) {
  var sel = document.getElementById(id);
  unique(field).forEach(function(v) {
    var o = document.createElement('option');
    o.value = v; o.textContent = v; sel.appendChild(o);
  });
}
fillSelect('filter-mode', 'mode');
fillSelect('filter-standard', 'standard');
fillSelect('filter-vehicle', 'vehicle');
fillSelect('filter-settlement', 'settlement');

function tagClass(key, val) {
  if (!val) return '';
  if (key === 'mode') {
    if (val.indexOf('撮合')>=0 && val.indexOf('聚合')>=0) return 'tag-撮合、聚合';
    if (val.indexOf('撮合')>=0) return 'tag-撮合';
    if (val.indexOf('聚合')>=0) return 'tag-聚合';
  }
  if (key === 'standard') return val==='标准' ? 'tag-标' : 'tag-非标';
  if (key === 'type') return val==='B' ? 'tag-B' : val==='C' ? 'tag-C' : '';
  if (key === 'settlement') return val==='预付' ? 'tag-预付' : val==='月结' ? 'tag-月结' : '';
  return '';
}
function renderTag(val, key) {
  if (!val) return '';
  return '<span class="tag ' + tagClass(key, val) + '">' + val + '</span>';
}
function filterMatch(d, q) {
  var fields = [d.name, d.biz, d.vehicle, d.mode, d.settlement, d.subchanel];
  for (var i = 0; i < fields.length; i++) {
    if (fields[i] && fields[i].toLowerCase().indexOf(q) >= 0) return true;
  }
  return false;
}

function render() {
  var q = document.getElementById('search').value.toLowerCase().trim();
  var fm = document.getElementById('filter-mode').value;
  var fs = document.getElementById('filter-standard').value;
  var fv = document.getElementById('filter-vehicle').value;
  var fx = document.getElementById('filter-settlement').value;

  var rows = data.filter(function(d) {
    if (q && !filterMatch(d, q)) return false;
    if (fm && d.mode.indexOf(fm)<0) return false;
    if (fs && d.standard !== fs) return false;
    if (fv && d.vehicle.indexOf(fv)<0) return false;
    if (fx && d.settlement !== fx) return false;
    return true;
  });

  document.getElementById('count').textContent = rows.length;
  var tbody = document.getElementById('tbody');
  var empty = document.getElementById('empty-msg');

  if (rows.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  tbody.innerHTML = rows.map(function(d) {
    return '<tr>' +
      '<td style="font-family:monospace;color:#1677ff;font-size:12px;font-weight:600">' + (d.subchanel || '—') + '</td>' +
      '<td><strong>' + d.name + '</strong></td>' +
      '<td>' + renderTag(d.mode, 'mode') + '</td>' +
      '<td>' + renderTag(d.standard, 'standard') + '</td>' +
      '<td>' + renderTag(d.type, 'type') + '</td>' +
      '<td>' + d.vehicle + '</td>' +
      '<td>' + renderTag(d.settlement, 'settlement') + '</td>' +
      '<td>' + d.biz + '</td>' +
      '<td>' + d.onlineDate + '</td>' +
      '<td class="tag-上线">' + d.status + '</td>' +
      '<td>' + d.scale + '</td>' +
      '<td>' + d.dispatch + '</td>' +
      '<td>' + d.complete + '</td>' +
      '</tr>';
  }).join('');
}
render();
</script>
